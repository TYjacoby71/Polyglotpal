# Project-wide Gradle settings

# Build performance
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=true

# React Native
android.useAndroidX=true
android.enableJetifier=true
reactNativeArchitectures=arm64-v8a,armeabi-v7a,x86,x86_64
newArchEnabled=false
hermesEnabled=true

# Signing (set these in your CI environment or local gradle.properties outside repo)
# MYAPP_UPLOAD_STORE_FILE=polyglotpal-release-key.keystore
# MYAPP_UPLOAD_KEY_ALIAS=polyglotpal
# MYAPP_UPLOAD_STORE_PASSWORD=
# MYAPP_UPLOAD_KEY_PASSWORD=
